<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groww Stock Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="header-top">
          <h1>Stock Tracker</h1>
          <span id="extension-version" class="version-badge">v--</span>
        </div>
        <div class="header-stats">
          <span id="total-stocks">0 stocks</span>
        </div>
      </div>
    </header>

    <div class="controls">
      <button id="track-current-btn" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Track This Page
      </button>
      <button id="refresh-btn" class="btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
        </svg>
        Refresh Prices
      </button>
      <button id="clear-all-btn" class="btn-danger">Clear All</button>
    </div>

    <div class="backup-actions">
      <button id="export-btn" class="btn-secondary btn-small" type="button">Export Backup</button>
      <button id="import-btn" class="btn-secondary btn-small" type="button">Import Backup</button>
      <input id="import-file-input" type="file" accept="application/json" hidden>
    </div>

    <div class="auto-refresh-row">
      <div class="auto-refresh-copy">
        <strong>Auto Refresh</strong>
        <span>Refresh prices automatically while the popup is open</span>
      </div>
      <label class="switch" for="auto-refresh-toggle">
        <input id="auto-refresh-toggle" type="checkbox" aria-label="Toggle auto refresh" title="Toggle auto refresh">
        <span class="slider"></span>
      </label>
    </div>

    <div id="status-message" class="status-message" aria-live="polite"></div>

    <div id="stocks-container" class="stocks-container">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
        <h3>No stocks tracked yet</h3>
        <p>Visit a stock page on Groww and click the "Track" button</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
